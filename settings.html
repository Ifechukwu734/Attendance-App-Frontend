<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
--primary:#2563eb;
--success:#10b981;
--danger:#ef4444;
--dark:#0f172a;
--bg:#f8fafc;
--text:#64748b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Segoe UI,sans-serif;
}

body{
background:var(--bg);
padding:30px;
}

.page-header{
margin-bottom:30px;
}

.page-header h1{
color:var(--dark);
margin-bottom:8px;
}

.page-header p{
color:var(--text);
}


.profile-circle{
    width:min(30vw, 150px);
    aspect-ratio:1;
    border-radius:50%;
    overflow:hidden;
}

.profile-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.back-btn{
    background:white;
    border:none;
    padding:12px 20px;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
    box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.back-btn:hover{
    transform:translateY(-2px);
}


.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}


.settings-layout{
display:grid;
grid-template-columns:280px 1fr;
gap:25px;
}

.sidebar{
background:white;
border-radius:20px;
padding:20px;
height:fit-content;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.menu{
list-style:none;
}

.menu li{
margin-bottom:10px;
}

.menu a{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-radius:12px;
text-decoration:none;
color:#475569;
transition:.3s;
}

.menu a:hover,
.menu a.active{
background:#2563eb;
color:white;
}

.content{
display:flex;
flex-direction:column;
gap:25px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

.card h2{
margin-bottom:20px;
color:var(--dark);
}

.profile-section{
display:flex;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.message-box{
    background-color: rgb(250, 61, 61); 
    height: 30px;
    margin-block-start: 10px;
    text-align: center; 
    padding-top: 3px; 
    border-radius: 5px; 
    color: white;
    opacity: 0;
    visibility: visible;
    transform: translateY(-20px);
    transition: all .3s ease;
}


.message-box.show{
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.message-box.success{
    background: #16a34a;
}

.message-box.error{
    background: #dc2626;
}




.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;

    opacity:0;
    visibility:hidden;
    transition:0.3s ease;
    padding:20px;
}

.modal-overlay.active{
    opacity:1;
    visibility:visible;
}

.modal{
    background:#fff;
    width:100%;
    max-width:420px;
    border-radius:16px;
    padding:30px 25px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    animation:popup 0.3s ease;
}

@keyframes popup{
    from{
        transform:translateY(20px) scale(0.95);
        opacity:0;
    }
    to{
        transform:translateY(0) scale(1);
        opacity:1;
    }
}

.modal-icon{
    width:80px;
    height:80px;
    margin:0 auto 20px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    color:#fff;
}

.success{
    background:#22c55e;
}

.danger{
    background:#ef4444;
}

.modal h2{
    margin-bottom:10px;
    color:#111827;
}

.modal p{
    color:#6b7280;
    line-height:1.6;
    margin-bottom:25px;
}

.modal-buttons{
    display:flex;
    gap:12px;
}

.btn-pop{
    flex:1;
    border:none;
    padding:12px;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.cancel-btn{
    background:#e5e7eb;
    color:#374151;
}

.cancel-btn:hover{
    background:#d1d5db;
}

.create-btn{
    background:#2563eb;
    color:#fff;
}

.create-btn:hover{
    background:#1d4ed8;
}

.delete-btn{
    background:#ef4444;
    color:#fff;
}

.delete-btn:hover{
    background:#dc2626;
}

@media(max-width:480px){

    .modal{
        padding:25px 20px;
    }

    .modal-buttons{
        flex-direction:column;
    }

    .btn{
        width:100%;
    }
}




.upload-btn{
background:#eff6ff;
color:#2563eb;
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
}

.form-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 300px));
    gap: 20px;
}

.form-group{
display:flex;
flex-direction:column;
width: 100%;
max-width: 350px;
}

.form-group label{
margin-bottom:8px;
font-weight:600;
}

.form-group input,
.form-group select{
padding:12px;
border:1px solid #e2e8f0;
border-radius:10px;
outline:none;

}

.setting-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 0;
border-bottom:1px solid #e2e8f0;
}

.setting-row:last-child{
border-bottom:none;
}

.switch{
position:relative;
width:55px;
height:28px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#cbd5e1;
border-radius:50px;
transition:.3s;
}

.slider:before{
content:"";
position:absolute;
width:22px;
height:22px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#2563eb;
}

input:checked + .slider:before{
transform:translateX(27px);
}

.save-btn{
background:#2563eb;
color:white;
border:none;
padding:14px 25px;
border-radius:12px;
cursor:pointer;
font-weight:600;
margin-top:15px;
}

.danger-btn{
background:#ef4444;
color:white;
border:none;
padding:14px 25px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

@media(max-width:900px){

.settings-layout{
grid-template-columns:1fr;
}

}

</style>
</head>

<script>

    function openModal(id){
        document.getElementById(id).classList.add('active');
    }

    function closeModal(id){
        document.getElementById(id).classList.remove('active');
    }

    logout_btn = document.getElementById('logout-btn');



    async function lecturerLogout(){
        try{
            const token = localStorage.getItem('auth_token');
            logout_btn = document.getElementById('logout-btn');

            logout_btn.innerHTML = 'Logging Out'
            logout_btn.disabled = true;
            const response = await fetch(
                'https://attendance-app-backend-wasa.onrender.com/lecturer-logout/',
                {
                    method: 'POST',
                    headers:{
                        'Authorization': `Token ${token}`,
                        'Content-Type': 'application/json'
                    }
                }
            );
            
            const data = await response.json();
            if(response.status == 200){
                logout_btn.innerHTML = 'Log Out'
                logout_btn.disabled = false;
                showMessage(data.message, 'success');
                setTimeout(()=>{
                    window.location.href = 'login.html';
                    localStorage.removeItem('auth_token');
                }, 2000)
            } else{
                logout_btn.innerHTML = 'Log Out' 
                logout_btn.disabled = false;
            }
        } catch(e){
            logout_btn.innerHTML = 'Log Out' 
            logout_btn.disabled = false;
            console.log(e)
        }
    }


    function showMessage(message, type) {
const messageBox = document.getElementById('message-box');

messageBox.textContent = message;

messageBox.classList.remove('success', 'error');

messageBox.classList.add(type);
messageBox.classList.add('show');

setTimeout(() => {
    messageBox.classList.remove('show');
}, 3000);
}
</script>

<script>

document.addEventListener('DOMContentLoaded', () => {
    const changePhoto = document.getElementById('change-photo');
    const profileImg = document.getElementById('profile-img');

    changePhoto.addEventListener('change', function () {
    const file = this.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        profileImg.src = e.target.result;
    };

    reader.readAsDataURL(file);
});
});
</script>


<script>
    save_btn = document.getElementById('save-btn');

    save_btn.addEventListener(
        'click',
        updateProfile,
    )

    async function updateProfile(){
        try{
            const token = localStorage.getItem('auth_token');

            i_first_name = document.getElementById('input-first_name').value
            i_last_name = document.getElementById('input-last_name').value
            i_dept = document.getElementById('input-dept').value
            i_email = document.getElementById('input-email').value
            profile_image = document.getElementById('profile-img').value;
            change_photo = document.getElementById('change-photo')
            save_btn = document.getElementById('save-btn');

            const formData = new FormData();

            formData.append('first_name', i_first_name);
            formData.append('last_name', i_last_name);
            formData.append('department', i_dept);
            formData.append('email', i_email);

            if (change_photo.files.length) {
                formData.append('profile_image', change_photo.files[0]);
                }

            save_btn.innerHTML = 'Saving.....';
            save_btn.disabled = true;
            const response = await fetch(
                'https://attendance-app-backend-wasa.onrender.com/lecturer-profile/',
                {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Token ${token}`,
                    },
                    body: formData
                }
            );

            const data = await response.json();

            if(response.status == 200){
                save_btn.innerHTML = 'Save Changes';
                save_btn.disabled = false;
                showMessage(data.message, 'success')
                setTimeout(() =>{
                    location.reload();
                }, 2000)
            } else if(response.status == 302){
                save_btn.innerHTML = 'Save Changes';
                save_btn.disabled = false;
                showMessage(data.message, 'error')
            } else{
                save_btn.innerHTML = 'Save Changes';
                save_btn.disabled = false;
                showMessage('An error occured', 'error')
            }

        } catch(e){
            save_btn.innerHTML = 'Save Changes';
            save_btn.disabled = false;
            console.log(e)
        }
    }


    function showMessage(message, type) {
const messageBox = document.getElementById('message-box');

messageBox.textContent = message;

messageBox.classList.remove('success', 'error');

messageBox.classList.add(type);
messageBox.classList.add('show');

setTimeout(() => {
    messageBox.classList.remove('show');
}, 3000);
}
</script>


<script>

            i_min_attendance = document.getElementById('input-min_attendance').value
            i_refresh = document.getElementById('input-refresh').value

            const formData = new FormData();

            formData.append('minimum_attendance', i_min_attendance);
            formData.append('token_expiration_time', i_exp);
            formData.append('token_refresh_time', i_refresh);

            save_btn.innerHTML = 'Updating.....';
            save_btn.disabled = true;
            const response = await fetch(
                'https://attendance-app-backend-wasa.onrender.com/lecturer-profile/',
                {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Token ${token}`,
                    },
                    body: formData
                }
            );

            const data = await response.json();

            if(response.status == 200){
                save_btn.innerHTML = 'Update Attendance Settings';
                save_btn.disabled = false;
                showMessage(data.message, 'success')
                setTimeout(() =>{
                    location.reload();
                }, 2000)
            } else if(response.status == 302){
                save_btn.innerHTML = 'Update Attendance Settings';
                save_btn.disabled = false;
                showMessage(data.message, 'error')
            } else{
                save_btn.innerHTML = 'Update Attendance Settings';
                save_btn.disabled = false;
                showMessage('An error occured', 'error')
            }

        } catch(e){
            save_btn.innerHTML = 'Update Attendance Settings';
            save_btn.disabled = false;
            console.log(e)
        }
    }


    function showMessage(message, type) {
const messageBox = document.getElementById('message-box');

messageBox.textContent = message;

messageBox.classList.remove('success', 'error');

messageBox.classList.add(type);
messageBox.classList.add('show');

setTimeout(() => {
    messageBox.classList.remove('show');
}, 3000);
}
</script>






<script>
    document.addEventListener(
        'DOMContentLoaded',
        getLecturerDetails
    )

    async function getLecturerDetails(){
        try{
            const token = localStorage.getItem('auth_token');
            profile_image = document.getElementById('profile-img');
            dept = document.getElementById('profile-dept');
            name = document.getElementById('profile-name');
            i_first_name = document.getElementById('input-first_name')
            i_last_name = document.getElementById('input-last_name')
            i_dept = document.getElementById('input-dept');
            i_email = document.getElementById('input-email')
            i_mobile = document.getElementById('input-mobile')
            i_min_attendance = document.getElementById('input-min_attendance')
            i_refresh = document.getElementById('input-refresh');
            i_exp = document.getElementById('input-exp');
            profile_circle = document.getElementById('profile-circle')

            document.getElementById('profile-name').textContent = 'Fetching Profile Details.....';

            const response = await fetch(
                'https://attendance-app-backend-wasa.onrender.com/lecturer-profile/',
                {
                    headers: {
                        'Authorization': `Token ${token}`
                    }
                }
            );

            const data = await response.json();

            if(response.status == 200){
                profile_info = data.data
                dept.innerHTML = profile_info.department;
                document.getElementById('profile-name').textContent = `${profile_info.first_name} ${profile_info.last_name}`
                i_first_name.value = profile_info.first_name
                i_last_name.value = profile_info.last_name
                i_dept.value = profile_info.department
                i_email.value = profile_info.email
                i_min_attendance.value = profile_info.minimum_attendance
                i_refresh.value = profile_info.token_refresh_time
                i_exp.value = profile_info.token_expiration_time
                profile_image.src = data.profile_image;
                
            }
        }catch(e){
            console.log(e);
        }
    }
</script>
