<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add New Course</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{
    --primary:#2563eb;
    --primary-dark:#1d4ed8;
    --success:#10b981;
    --danger:#ef4444;
    --dark:#0f172a;
    --text:#64748b;
    --bg:#f1f5f9;
    --card:#ffffff;
    --border:#e2e8f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Segoe UI,sans-serif;
}

body{
    background:var(--bg);
    min-height:100vh;
    padding:30px;
}

.page-header{
    max-width:1200px;
    margin:auto auto 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
}

.page-header h1{
    color:var(--dark);
    font-size:2rem;
    margin-bottom:5px;
}

.page-header p{
    color:var(--text);
}

.message-box{
    background-color: rgb(250, 61, 61); 
    height: 30px;
    margin-block-start: 10px;
    text-align: center; 
    padding-top: 3px; 
    border-radius: 5px; 
    color: white;
    opacity: 0;
    visibility: visible;
    transform: translateY(-20px);
    transition: all .3s ease;
}


.message-box.show{
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.message-box.success{
    background: #16a34a;
}

.message-box.error{
    background: #dc2626;
}

.back-btn{
    background:white;
    border:none;
    padding:12px 20px;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
    box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.back-btn:hover{
    transform:translateY(-2px);
}

.form-card{
    max-width:1200px;
    margin:auto;
    background:white;
    border-radius:24px;
    padding:40px;
    box-shadow:
    0 10px 40px rgba(15,23,42,.08);
}

.preview-card{
    background:
    linear-gradient(
        135deg,
        var(--primary),
        var(--primary-dark)
    );

    color:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:30px;
}

.preview-card h3{
    margin-bottom:15px;
}

.preview-item{
    margin-bottom:10px;
}

.preview-item span{
    opacity:.8;
    display:block;
    font-size:.9rem;
}

.time-group{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
}

.section-title{
    font-size:1.1rem;
    font-weight:700;
    color:var(--dark);
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
}

.section{
    margin-bottom:35px;
}

.form-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    margin-bottom:8px;
    font-weight:600;
    color:var(--dark);
}

.form-group input,
.form-group select{
    width:100%;
    padding:15px;
    border:1px solid var(--border);
    border-radius:14px;
    outline:none;
    transition:.3s;
    font-size:15px;
}

.form-group input:focus,
.form-group select:focus{
    border-color:var(--primary);
    box-shadow:
    0 0 0 4px rgba(37,99,235,.1);
}

.full-width{
    grid-column:1/-1;
}

.switch-container{
    display:flex;
    align-items:center;
    gap:15px;
}

.switch{
    position:relative;
    width:55px;
    height:30px;
}

.switch input{
    display:none;
}

.slider{
    position:absolute;
    inset:0;
    background:#cbd5e1;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
}

.slider::before{
    content:'';
    width:24px;
    height:24px;
    position:absolute;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.3s;
}

.switch input:checked + .slider{
    background:var(--success);
}

.switch input:checked + .slider::before{
    transform:translateX(25px);
}

.submit-section{
    display:flex;
    justify-content:flex-end;
    gap:15px;
    margin-top:20px;
}

.cancel-btn{
    padding:14px 25px;
    border:none;
    border-radius:14px;
    background:#e2e8f0;
    font-weight:600;
    cursor:pointer;
}

.save-btn{
    padding:14px 25px;
    border:none;
    border-radius:14px;
    background:
    linear-gradient(
        135deg,
        var(--primary),
        var(--primary-dark)
    );

    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.save-btn:hover{
    transform:translateY(-2px);
    box-shadow:
    0 10px 25px rgba(37,99,235,.25);
}

@media(max-width:768px){

    body{
        padding:15px;
    }

    .form-card{
        padding:20px;
    }

    .submit-section{
        flex-direction:column;
    }

    .submit-section button{
        width:100%;
    }

}

</style>
</head>

<body>

<div class="page-header">

    <div>
        <h1>Edit Course</h1>
        <p>Edit and configure attendance tracking for a course</p>
    </div>

    <button class="back-btn" id="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Courses
    </button>

</div>

<div class="form-card" id="form-card">
    
    <!-- <div class="preview-card">

        <h3>Course Preview</h3>

        <div class="preview-item">
            <span>Course Code</span>
            <strong id="preview-code">---</strong>
        </div>

        <div class="preview-item">
            <span>Course Title</span>
            <strong id="preview-title">---</strong>
        </div>

    </div> -->

    <form id="add-course-form">

        <div class="section">

            <div class="section-title">
                <i class="fa-solid fa-book"></i>
                Course Information
            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label>Course Title</label>
                    <input type="text"
                    id="course_title"
                    placeholder="">
                </div>

                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" spellcheck="false"
                    id="course_code"
                    placeholder="">
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" id="department"
                    placeholder="">
                </div>

                <div class="form-group">
                    <label>Level</label>
                    <select id="level">
                        <option>Select Level</option>
                        <option>100 Level</option>
                        <option>200 Level</option>
                        <option>300 Level</option>
                        <option>400 Level</option>
                        <option>500 Level</option>
                    </select>
                </div>

            </div>

        </div>

        <div class="section">

            <div class="section-title">
                <i class="fa-solid fa-calendar-days"></i>
                Lecture Schedule
            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label>Venue</label>
                    <input type="text" id="course_venue"
                    placeholder="">
                </div>

                <div class="form-group">
                    <label>Day</label>
                    <select id="day">
                        <option>Select Day</option>
                        <option>Monday</option>
                        <option>Tuesday</option>
                        <option>Wednesday</option>
                        <option>Thursday</option>
                        <option>Friday</option>
                        <option>Saturday</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Start Time</label>
                
                    <div class="time-group">
                
                        <select id="start_hour">
                            <option value="">Hour</option>
                            <option>01</option>
                            <option>02</option>
                            <option>03</option>
                            <option>04</option>
                            <option>05</option>
                            <option>06</option>
                            <option>07</option>
                            <option>08</option>
                            <option>09</option>
                            <option>10</option>
                            <option>11</option>
                            <option>12</option>
                        </select>
                
                        <select id="start_minute">
                            <option value="">Min</option>
                            <option>00</option>
                            <option>15</option>
                            <option>30</option>
                            <option>45</option>
                        </select>
                
                        <select id="start_period">
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                
                    </div>
                
                </div>

                <div class="form-group">
                    <label>End Time</label>
                
                    <div class="time-group">
                
                        <select id="end_hour">
                            <option value="">Hour</option>
                            <option>01</option>
                            <option>02</option>
                            <option>03</option>
                            <option>04</option>
                            <option>05</option>
                            <option>06</option>
                            <option>07</option>
                            <option>08</option>
                            <option>09</option>
                            <option>10</option>
                            <option>11</option>
                            <option>12</option>
                        </select>
                
                        <select id="end_minute">
                            <option value="">Min</option>
                            <option>00</option>
                            <option>15</option>
                            <option>30</option>
                            <option>45</option>
                        </select>
                
                        <select id="end_period">
                            <option>AM</option>
                            <option>PM</option>
                        </select>
                
                    </div>
                
                </div>

                <div class="form-group">
                    <label>Lecture Status</label>
                    <select id="lecture-status">
                        <option>Select Status</option>
                        <option>Upcoming</option>
                        <option>In Progress</option>
                        <option>Ended</option>
                        
                    </select>
                </div>

            </div>

        </div>

        <div class="section">

            <div class="section-title">
                <i class="fa-solid fa-location-dot"></i>
                Attendance Settings
            </div>

            <div class="form-grid">

                <div class="form-group">
                    <label>Geofencing Radius (m)</label>
                    <input type="number" id="geofencing"
                    placeholder="">
                </div>

                <div class="form-group">
                    <label>Number of Students</label>
                    <input type="number" id="number_of_students" 
                    placeholder="">
                    <small style="color: red;">Only input the number of students if the course is elective</small>
                </div>

                <div class="form-group full-width">

                    <label>Elective Course</label>

                    <div class="switch-container">

                        <label class="switch">
                            <input type="checkbox"
                            id="is_elective">
                            <span class="slider"></span>
                        </label>

                        <span>This course is elective</span>

                    </div>

                </div>

            </div>

        </div>

        <div class="submit-section">

            <button
            type="reset"
            class="cancel-btn">
            Cancel
            </button>

            <button
            type="submit"
            class="save-btn" id="submit-btn">
            <i class="fa-solid fa-floppy-disk"></i>
            Update Course
            </button>
        </div>

    </form>
    <div id="message-box" class="message-box">  </div>
</div>


<script>
    document.addEventListener(
        'DOMContentLoaded',
        getCourseDetails
    )
    
    async function getCourseDetails(){
        try{
            course_id = localStorage.getItem('course_id');
            token = localStorage.getItem('auth_token');
            
            const response = await fetch(
                `https://attendance-app-backend-production.up.railway.app/course/course-details/?course_id=${course_id}`,
                {
                    headers: {
                        'Authorization': `Token ${token}`,
                    }
                }
            );
        
            const data = await response.json();
            if(response.status == 200){
                document.getElementById('course_title').value = data.course_title;

                document.getElementById('course_code').value = data.course_code;

                document.getElementById('course_venue').value = data.course_location;

                document.getElementById('level').value = data.level;

                document.getElementById('day').value = data.day;

                document.getElementById('department').value = data.department;

                document.getElementById('geofencing').value = data.geofencing;

                document.getElementById('number_of_students').value = data.number_of_students;

                document.getElementById('is_elective').checked = data.is_elective;

                document.getElementById('lecture-status').value = data.schedule_status;  

                start_time = formatTime(data.start_time);

                endTime = formatTime(data.end_time);
            
                const[time, period] = start_time.split(' ');
                const[hour, minute] = time.split(':');

                const[end_time, end_period] = endTime.split(' ');
                const[end_hour, end_minute] = end_time.split(':');

                document.getElementById('start_hour').value = hour
                document.getElementById('start_minute').value = minute
                document.getElementById('start_period').value = period

                document.getElementById('end_hour').value = end_hour
                document.getElementById('end_minute').value = end_minute
                document.getElementById('end_period').value = end_period

            }
        } catch(e){
            console.log(e)
        }
    }


function formatTime(timeString){

const [hours, minutes] =
timeString.split(':');

let hour = parseInt(hours);
let period = 'AM';

if(hour >= 12){
period = 'PM';
}

if(hour === 0){
hour = 12;
} else if(hour > 12){
hour -= 12;
} 

if(hour < 10){
hour = `0${hour}`;
}

return `${hour}:${minutes} ${period}`;
}
</script>

<script>

back_button.addEventListener(

   () => { window.location.href = 'courses.html'}
)

).textContent =
titleInput.value || '---';

</script>

<script>

submit_button = document.getElementById('add-course-form');
    submit_button.addEventListener(
        'submit',
            
    async function postCourseSchedule(e){
    e.preventDefault();
    const startTime = convertTo24Hour(
    document.getElementById('start_hour').value,
    document.getElementById('start_minute').value,
    document.getElementById('start_period').value
    );


    const endTime = convertTo24Hour(
        document.getElementById('end_hour').value,
        document.getElementById('end_minute').value,
        document.getElementById('end_period').value
    );
    try{
    document.getElementById('submit-btn').innerHTML = 'Updating.....'
    document.getElementById('submit-btn').disabled = true;
    course_id = localStorage.getItem('course_id');

    course_title = document.getElementById('course_title').value;

    course_code = document.getElementById('course_code').value;

    course_venue = document.getElementById('course_venue').value;

    level = document.getElementById('level').value;

    day = document.getElementById('day').value;

    department = document.getElementById('department').value;

    start_time = startTime;

    end_time = endTime;

    geofencing = document.getElementById('geofencing').value;

    lecture_status = document.getElementById('lecture-status').value

    number_of_students = document.getElementById('number_of_students').value;

    is_elective = document.getElementById('is_elective').checked;

    token = localStorage.getItem('auth_token');

    const response = await fetch(
    'https://attendance-app-backend-production.up.railway.app/course/course-management/',
            {
                method: 'PATCH',
                headers: {
                    'Authorization': `Token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    course_id: course_id,
                    course_title : course_title,
                    course_code : course_code,
                    course_location : course_venue,
                    schedule_status: lecture_status,
                    level : level,
                    day :day,
                    start_time :start_time,
                    end_time : end_time,
                    is_elective : is_elective,
                    department : department,
                    geo_fencing : geofencing,
                    number_of_students : number_of_students
                })
            } 
    );

    const data = await response.json();
    console.log(data)
    if(response.status == 200){
        document.getElementById('submit-btn').innerHTML = 'Update'
        document.getElementById('submit-btn').disabled = false;
        showMessage(data.message, 'success')
        setTimeout(()=>{
            window.location.href = 'courses.html'
        }, 2000)
        
    } else{
        document.getElementById('submit-btn').innerHTML = 'Update'
        document.getElementById('submit-btn').disabled = false;
       showMessage(data.message, 'error')
    }
} catch(e){
    document.getElementById('submit-btn').innerHTML = 'Update'
    document.getElementById('submit-btn').disabled = false;
    console.log(e)
}
}

    )


function showMessage(message, type) {
const messageBox = document.getElementById('message-box');

messageBox.textContent = message;

messageBox.classList.remove('success', 'error');

messageBox.classList.add(type);
messageBox.classList.add('show');

setTimeout(() => {
    messageBox.classList.remove('show');
}, 3000);
}


function convertTo24Hour(hour, minute, period){

let h = parseInt(hour);

if(period === 'PM' && h !== 12){
    h += 12;
}

if(period === 'AM' && h === 12){
    h = 0;
}

return `${String(h).padStart(2,'0')}:${minute}:00`;
}
</script>
