<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EduAttend - Sign Up</title>

<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Left Panel -->
    <div class="left-panel">

        <div class="overlay">

            <div class="brand">

                <i class="fa-solid fa-graduation-cap"></i>

                <h1>EduAttend</h1>

                <p>
                    Smart Attendance Management System
                    for Universities and Colleges.
                </p>

            </div>

        </div>

    </div>

    <!-- Right Panel -->
    <div class="right-panel">

        <div class="login-card">

            <h2>Create Account</h2>

            <p class="subtitle">
                Register to start using EduAttend
            </p>

            <form id="signup-form">

                <!-- Email -->
                <div class="input-group">
                    <label>Email Address</label>

                    <div class="input-box">
                        <i class="fa-solid fa-envelope"></i>

                        <input
                            type="email"
                            id="email"
                            placeholder="Enter your email"
                            required
                        >
                    </div>
                </div>

                <!-- First Name -->
                <div class="input-group">

                    <label>First Name</label>

                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>

                        <input
                            type="text"
                            id="first_name"
                            placeholder="Enter first name"
                            required
                        >
                    </div>

                </div>

                <!-- Last Name -->
                <div class="input-group">

                    <label>Last Name</label>

                    <div class="input-box">
                        <i class="fa-solid fa-user"></i>

                        <input
                            type="text"
                            id="last_name"
                            placeholder="Enter last name"
                            required
                        >
                    </div>

                </div>

                <!-- Department -->
                <div class="input-group">

                    <label>Department</label>

                    <div class="input-box">

                        <i class="fa-solid fa-building-columns"></i>

                        <select id="department" required>

                            <option value="">Select Department</option>

                            <option>Computer Science</option>
                            <option>Statistics</option>
                            <option>Mathematics</option>
                            <option>Chemistry</option>
                            <option>Physics</option>
                            <option>Geology</option>

                        </select>

                    </div>

                </div>

                <!-- Password -->
                <div class="input-group">

                    <label>Password</label>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="password"
                            placeholder="Create password"
                            required
                        >

                    </div>

                </div>

                <!-- Confirm Password -->
                <div class="input-group">

                    <label>Confirm Password</label>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                            type="password"
                            id="confirm_password"
                            placeholder="Confirm password"
                            required
                        >

                    </div>

                </div>

                <button
                    type="submit"
                    class="login-btn"
                    id="signup-btn"
                >

                    <span id="btn-text">Create Account</span>

                    <span id="loader" class="loader"></span>

                </button>

                <div id="message-box" class="message-box"></div>

            </form>

            <div style="margin-top:20px;text-align:center;">

                Already have an account?

                <a href="login.html"
                style="color:#2563EB;font-weight:bold;text-decoration:none;">
                    Login
                </a>

            </div>

        </div>

    </div>

</div>

<script>

function showMessage(message, type){

    const messageBox = document.getElementById('message-box');

    messageBox.textContent = message;

    messageBox.classList.remove('success','error');

    messageBox.classList.add(type);

    messageBox.classList.add('show');

    setTimeout(()=>{
        messageBox.classList.remove('show');
    },3000);

}

document.getElementById('signup-form').addEventListener('submit', async function(e){

    e.preventDefault();

    const email = document.getElementById('email').value;

    const first_name = document.getElementById('first_name').value;

    const last_name = document.getElementById('last_name').value;

    const department = document.getElementById('department').value;

    const password = document.getElementById('password').value;

    const confirm_password = document.getElementById('confirm_password').value;

    if(password !== confirm_password){

        showMessage('Passwords do not match','error');

        return;

    }

    const btn = document.getElementById('signup-btn');

    const loader = document.getElementById('loader');

    const text = document.getElementById('btn-text');

    btn.disabled = true;

    loader.classList.add('show');

    text.textContent = "Creating Account...";

    try{

        const response = await fetch(
            "https://attendance-app-backend-production.up.railway.app/lecturer-signup/",
            {
                method:'POST',
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    email,
                    first_name,
                    last_name,
                    department,
                    password
                })
            }
        );

        const data = await response.json();

        btn.disabled = false;

        loader.classList.remove('show');

        text.textContent = "Create Account";

        if(response.ok){

            showMessage(data.message || "Registration successful","success");

            document.getElementById('signup-form').reset();

            setTimeout(()=>{
                window.location.href="index.html";
            },2000);

        }else{

            showMessage(data.message || "Registration failed","error");

        }

    }catch(error){

        btn.disabled = false;

        loader.classList.remove('show');

        text.textContent = "Create Account";

        showMessage("Server error","error");

        console.error(error);

    }

});

</script>

</body>
</html>
